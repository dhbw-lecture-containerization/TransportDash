name: Build and push Streamlit-Container to GHCR

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: streamlit/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/transportdash-streamlit:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/transportdash-streamlit:latest
