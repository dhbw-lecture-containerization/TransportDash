services:
  airflow:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspaces/airflow/:cached  
    command: sleep infinity
    environment:
      AIRFLOW_CONN_POSTGRES_CONN : postgresql://postgres:postgres@db:5432/postgres

  db:
    image: postgres:latest
    restart: always
    volumes:
      - postgres-data-airflow:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

volumes:
  postgres-data-airflow:
